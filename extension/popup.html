<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>NOCC (dev)</title>
  <style>
    :root {
      --bg: #18181b;
      --surface: #27272a;
      --border: #3f3f46;
      --text: #e4e4e7;
      --muted: #71717a;
      --accent: #7c3aed;
      --accent-hover: #6d28d9;
      --green: #22c55e;
      --red: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      font: 13px system-ui, sans-serif;
      width: 320px;
      padding: 12px;
      background: var(--bg);
      color: var(--text);
      margin: 0;
    }

    label {
      display: block;
      margin-top: 10px;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input {
      width: 100%;
      padding: 6px 8px;
      margin-top: 3px;
      font: 12px monospace;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      outline: none;
    }

    input:focus { border-color: var(--accent); }
    input[readonly] { color: var(--muted); }

    button {
      padding: 6px 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }

    button:hover { background: var(--accent-hover); }

    #idSource {
      display: block;
      font-size: 10px;
      color: var(--muted);
      margin-top: 3px;
    }

    .row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-top: 3px;
    }

    .row input { flex: 1; margin-top: 0; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-dot.connected { background: var(--green); }

    .status-text {
      font-size: 11px;
      color: var(--muted);
    }

    #log {
      margin-top: 10px;
      height: 140px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 8px;
      font: 11px monospace;
      background: var(--surface);
      color: var(--text);
    }

    #log div {
      margin-bottom: 3px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    #hookList {
      margin-top: 4px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .hook-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font: 11px monospace;
      color: var(--text);
    }

    .hook-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    #showStoredKeys { margin-top: 12px; }
  </style>
</head>
<body>
  <label>Your ID</label>
  <div class="row">
    <input id="myId" readonly>
    <button id="copyId">Copy</button>
  </div>
  <span id="idSource"></span>

  <label>Relay URL</label>
  <input id="relayUrl" value="http://localhost:3000">

  <div class="status-row">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Disconnected</span>
  </div>

  <label>Loaded Hooks</label>
  <div id="hookList"><span style="font:11px monospace;color:var(--muted)">scanning…</span></div>

  <button id="showStoredKeys">Show Stored Keys</button>

  <div id="log"></div>

  <script type="module" src="popup.js"></script>
</body>
</html>
